<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 3rem; color: #38bdf8; margin-bottom: 1rem; }
    p  { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
    .badge {
      background: #1e293b;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mis Apps</h1>
    <p>Frontend desplegado con CI/CD en AWS ECR</p>
    <span class="badge">v1.0 — Docker + GitHub Actions</span>
  </div>
</body>
</html>
